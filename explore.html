<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore — WorldFeed</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background: #000 !important;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica Neue, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        .app-container {
            display: grid;
            grid-template-columns: 275px 1fr 350px;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100vh;
        }
        
        @media (max-width: 1200px) {
            .app-container {
                grid-template-columns: 275px 1fr;
            }
            .right-sidebar {
                display: none;
            }
        }
        
        @media (max-width: 800px) {
            .app-container {
                grid-template-columns: 1fr;
            }
            .left-sidebar {
                display: none;
            }
        }
        
        .left-sidebar {
            border-right: 1px solid #2f3336;
            padding: 20px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 16px;
            color: #fff;
            text-decoration: none;
            border-radius: 9999px;
            transition: background 0.2s;
            font-size: 20px;
        }
        
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        
        .nav-item.active {
            font-weight: 700;
        }
        
        .nav-item svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }
        
        .post-btn {
            background: #ffffff;
            color: #000;
            border: none;
            border-radius: 9999px;
            padding: 16px 32px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        
        .post-btn:hover {
            background: #e5e5e5;
        }
        
        .main-content {
            border-right: 1px solid #2f3336;
            min-height: 100vh;
        }
        
        .feed-header {
            padding: 16px;
            border-bottom: 1px solid #2f3336;
            font-size: 20px;
            font-weight: 700;
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid #2f3336;
        }
        
        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            color: #71767b;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .tab:hover {
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
        }
        
        .tab.active {
            color: #fff;
            border-bottom-color: #ffffff;
        }
        
        .explore-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
            padding: 16px;
        }
        
        .explore-card {
            background: #16181c;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .explore-card:hover {
            transform: scale(1.02);
        }
        
        .explore-card.video {
            grid-column: span 2;
            grid-row: span 2;
        }
        
        .card-media {
            width: 100%;
            height: 200px;
            background: #2f3336;
            position: relative;
        }
        
        .explore-card.video .card-media {
            height: 100%;
            min-height: 300px;
        }
        
        .card-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .card-type {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.8);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
        }
        
        .card-info {
            padding: 12px;
        }
        
        .card-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        
        .card-meta {
            color: #71767b;
            font-size: 13px;
        }
        
        .right-sidebar {
            padding: 20px;
        }
        
        .search-box {
            background: #202327;
            border-radius: 9999px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }
        
        .search-box input {
            background: transparent;
            border: none;
            color: #fff;
            width: 100%;
            outline: none;
        }
        
        .trending-card {
            background: #16181c;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .trending-title {
            font-weight: 700;
            margin-bottom: 16px;
        }
        
        .trending-item {
            padding: 8px 0;
            cursor: pointer;
        }
        
        .trending-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Left Sidebar - Navigation -->
        <div class="left-sidebar">
            <div class="logo">
                <svg viewBox="0 0 24 24" width="40" height="40" fill="#ffffff">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
            </div>
            
            <nav>
                <a href="index.html" class="nav-item">
                    <svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    <span>Home</span>
                </a>
                <a href="explore.html" class="nav-item active">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <span>Explore</span>
                </a>
                <a href="videos.html" class="nav-item">
                    <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                    <span>Videos</span>
                </a>
                <a href="articles.html" class="nav-item">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>
                    <span>Articles</span>
                </a>
                <a href="messages.html" class="nav-item">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
                    <span>Messages</span>
                </a>
                <a href="profile.html" class="nav-item">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <span>Profile</span>
                </a>
            </nav>
            
            <button class="post-btn" onclick="window.location.href='index.html'">Post</button>
        </div>
        
        <!-- Main Content - Explore -->
        <div class="main-content">
            <div class="feed-header">Explore</div>
            <div class="tabs">
                <div class="tab active" onclick="loadContent('all')">All</div>
                <div class="tab" onclick="loadContent('videos')">Videos</div>
                <div class="tab" onclick="loadContent('articles')">Articles</div>
                <div class="tab" onclick="loadContent('images')">Images</div>
            </div>
            <div id="exploreGrid" class="explore-grid">
                <!-- Content will be loaded here -->
            </div>
        </div>
        
        <!-- Right Sidebar -->
        <div class="right-sidebar">
            <div class="search-box">
                <input type="text" placeholder="Search" id="searchInput" onkeypress="if(event.key==='Enter')search()">
            </div>
            
            <div class="trending-card">
                <div class="trending-title">Trending</div>
                <div class="trending-item">#WorldFeed</div>
                <div class="trending-item">#AntiAlgo</div>
                <div class="trending-item">#PrecogAI</div>
                <div class="trending-item">#Decentralized</div>
            </div>
        </div>
    </div>
    
    <script>
        // Load all content from API
        document.addEventListener('DOMContentLoaded', function() {
            loadContent('all');
        });
        
        function loadContent(type) {
            // Update active tab
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            const grid = document.getElementById('exploreGrid');
            grid.innerHTML = '';
            
            let url = 'http://localhost:8083/api/precog/feed?writing=10&video=5&image=5';
            if (type === 'videos') url = 'http://localhost:8083/api/precog/feed?video=20';
            if (type === 'articles') url = 'http://localhost:8083/api/precog/feed?writing=20';
            if (type === 'images') url = 'http://localhost:8083/api/precog/feed?image=20';
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data && data.data && data.data.feed) {
                        displayContent(data.data.feed, type);
                    }
                })
                .catch(error => {
                    console.log('Using offline data');
                    displayOfflineContent(type);
                });
        }
        
        function displayContent(items, type) {
            const grid = document.getElementById('exploreGrid');
            
            items.forEach((item, index) => {
                const content = item.content || item;
                const itemType = item.type || 'written';
                
                const div = document.createElement('div');
                div.className = 'explore-card' + (itemType === 'video' ? ' video' : '');
                
                let media = '';
                if (itemType === 'video') {
                    media = `<img src="${content.thumbnail_url || 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800'}" alt="${content.title || 'Video'}">`;
                } else if (itemType === 'image') {
                    media = `<img src="${content.image_url || 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800'}" alt="${content.title || 'Image'}">`;
                } else {
                    media = `<img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800" alt="${content.title || 'Article'}">`;
                }
                
                div.innerHTML = `
                    <div class="card-media">
                        ${media}
                        <div class="card-type">${itemType.toUpperCase()}</div>
                    </div>
                    <div class="card-info">
                        <div class="card-title">${content.title || 'Content'}</div>
                        <div class="card-meta">${content.source || 'WorldFeed'} • ${formatTime(item.timestamp)}</div>
                    </div>
                `;
                
                grid.appendChild(div);
            });
        }
        
        function displayOfflineContent(type) {
            const grid = document.getElementById('exploreGrid');
            
            for (let i = 0; i < 12; i++) {
                const div = document.createElement('div');
                div.className = 'explore-card' + (i < 2 ? ' video' : '');
                div.innerHTML = `
                    <div class="card-media">
                        <img src="https://images.unsplash.com/photo-${1451187580459 + i}-43490279c0fa?w=800" alt="Content">
                        <div class="card-type">${i < 2 ? 'VIDEO' : (i < 6 ? 'IMAGE' : 'ARTICLE')}</div>
                    </div>
                    <div class="card-info">
                        <div class="card-title">Explore Content ${i + 1}</div>
                        <div class="card-meta">WorldFeed • ${i + 1}h ago</div>
                    </div>
                `;
                grid.appendChild(div);
            }
        }
        
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000 / 60);
            
            if (diff < 60) return `${diff}m ago`;
            if (diff < 1440) return `${Math.floor(diff / 60)}h ago`;
            return `${Math.floor(diff / 1440)}d ago`;
        }
        
        function search() {
            const query = document.getElementById('searchInput').value;
            console.log('Searching for:', query);
            // Implement search functionality
        }
    </script>
</body>
</html>
