<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Anti-Algo News Network — Oroboros Labs</title>
    <meta name="description" content="Anti-algorithm social network. No shadowbans. No algorithmic suppression. Real news, verified sources, sovereign intelligence.">
    <meta property="og:title" content="Anti-Algo News Network">
    <meta property="og:description" content="Major underreported events, ranked by verification. No algorithmic suppression.">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/svg+xml" href="assets/img/oroboros-logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Archivo:wght@200;300;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro-orange: #D97757;
            --oro-glow: rgba(217,119,87,0.5);
            --bg-primary: #000000;
            --bg-secondary: rgba(255,255,255,0.03);
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --border-color: rgba(255,255,255,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .app {
            display: grid;
            grid-template-columns: 275px 1fr 350px;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100vh;
        }
        /* Sidebar */
        .sidebar {
            position: fixed;
            width: 275px;
            height: 100vh;
            padding: 20px 12px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        .logo {
            padding: 12px;
            margin-bottom: 8px;
        }
        .logo img {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 12px var(--oro-glow));
        }
        .sidebar nav {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .sidebar nav a,
        .sidebar nav .nav-item {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 20px;
            padding: 14px 16px;
            font-size: 19px;
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 9999px;
            transition: background 0.2s;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }
        .sidebar nav a:hover,
        .sidebar nav .nav-item:hover { background: var(--bg-secondary); }
        .sidebar nav a.active,
        .sidebar nav .nav-item.active { font-weight: 700; }
        .sidebar nav a svg,
        .sidebar nav .nav-item svg { width: 24px; height: 24px; fill: currentColor; flex-shrink: 0; }
        .sidebar nav a span,
        .sidebar nav .nav-item span { white-space: nowrap; }
        .post-btn {
            background: var(--oro-orange);
            color: white;
            border: none;
            padding: 14px 0;
            margin: 16px 8px;
            border-radius: 9999px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: calc(100% - 16px);
        }
        .post-btn:hover { opacity: 0.9; }
        .user-profile {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 9999px;
            cursor: pointer;
        }
        .user-profile:hover { background: var(--bg-secondary); }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--oro-orange);
        }
        .user-info { flex: 1; }
        .user-name { font-weight: 700; font-size: 14px; }
        .user-handle { color: var(--text-secondary); font-size: 13px; }
        /* Main Feed */
        .main {
            margin-left: 275px;
            border-right: 1px solid var(--border-color);
            min-height: 100vh;
        }
        .feed-header {
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }
        .feed-title {
            font-size: 20px;
            font-weight: 700;
        }
        .feed-tabs {
            display: flex;
            margin-top: 12px;
        }
        .feed-tab {
            flex: 1;
            text-align: center;
            padding: 16px;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .feed-tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--oro-orange);
        }
        /* Posts */
        .post {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }
        .post:hover { background: var(--bg-secondary); }
        .post-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--oro-orange), #ff9a76);
        }
        .post-author { font-weight: 700; }
        .post-handle { color: var(--text-secondary); }
        .post-verified {
            width: 18px;
            height: 18px;
            fill: var(--oro-orange);
        }
        .post-content {
            margin: 8px 0 12px 60px;
            font-size: 15px;
            line-height: 1.5;
        }
        .post-media {
            margin-left: 60px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .post-media img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
        }
        .post-actions {
            display: flex;
            gap: 48px;
            margin-left: 60px;
        }
        .post-action {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
        }
        .post-action:hover { color: var(--oro-orange); }
        .post-action svg { width: 18px; height: 18px; }
        /* Right Sidebar */
        .right-sidebar {
            padding: 20px;
        }
        .search-box {
            background: var(--bg-secondary);
            border-radius: 9999px;
            padding: 12px 16px;
            margin-bottom: 16px;
        }
        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            width: 100%;
        }
        .trending-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .trending-title {
            font-weight: 700;
            margin-bottom: 16px;
        }
        .trending-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .trending-item:last-child { border-bottom: none; }
        .trending-category {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .trending-topic {
            font-weight: 700;
            margin: 4px 0;
        }
        .trending-count {
            font-size: 12px;
            color: var(--text-secondary);
        }
        /* Auth Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #16181c;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
        }
        .modal-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }
        .modal input {
            width: 100%;
            padding: 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            margin-bottom: 16px;
            font-size: 15px;
        }
        .modal input:focus { outline: none; border-color: var(--oro-orange); }
        .modal-btn {
            width: 100%;
            padding: 14px;
            background: var(--oro-orange);
            border: none;
            border-radius: 9999px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }
        .modal-btn:hover { opacity: 0.9; }
        .modal-switch {
            text-align: center;
            margin-top: 16px;
            color: var(--text-secondary);
        }
        .modal-switch a {
            color: var(--oro-orange);
            text-decoration: none;
        }
        /* Precog Badge */
        .precog-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, var(--oro-orange), #ff9a76);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            margin-left: 8px;
        }
        /* Verification Tier */
        .tier-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 4px;
        }
        .tier-5 { background: #ff6b35; color: white; }
        .tier-4 { background: #ff9f1c; color: black; }
        .tier-3 { background: #2ec4b6; color: white; }
        .tier-2 { background: #011627; color: white; }
        .tier-1 { background: #6c757d; color: white; }
        /* Responsive */
        @media (max-width: 1200px) {
            .right-sidebar { display: none; }
            .app { grid-template-columns: 275px 1fr; }
        }
        @media (max-width: 800px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
            .app { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="authModal">
        <div class="modal">
            <div class="modal-title" id="authTitle">Sign in to Anti-Algo</div>
            <input type="text" id="authUsername" placeholder="Username">
            <input type="password" id="authPassword" placeholder="Password" style="display:none;">
            <button class="modal-btn" onclick="handleAuth()">Sign In</button>

                Don't have an account? <a href="#" onclick="toggleAuthMode()">Sign up</a>

    <!-- Post Modal -->
    <div class="modal-overlay" id="postModal">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-title">Create Post</div>
            <textarea id="postContent" style="width:100%;min-height:150px;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:8px;color:var(--text-primary);padding:16px;font-size:15px;resize:none;" placeholder="What's happening?"></textarea>
            <button class="modal-btn" onclick="submitPost()">Post</button>
        </div>
    </div>

    <script>
        // User state
        let currentUser = null;
        let posts = [];
        let authMode = 'signin';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadPosts();
            loadTrending();
            loadGlasswing();
            loadCensorship();
            checkAuth();
        });

        // Check authentication
        function checkAuth() {
            const saved = localStorage.getItem('antiAlgoUser');
            if (saved) {
                currentUser = JSON.parse(saved);
                updateUserDisplay();
            }
        }

        // Update user display
        function updateUserDisplay() {
            if (currentUser) {
                document.getElementById('currentUserName').textContent = currentUser.name;
                document.getElementById('currentUserHandle').textContent = '@' + currentUser.handle;
            }
        }

        // Auth functions
        function openAuthModal() {
            document.getElementById('authModal').classList.add('active');
        }

        function closeAuthModal() {
            document.getElementById('authModal').classList.remove('active');
        }

        function toggleAuthMode() {
            authMode = authMode === 'signin' ? 'signup' : 'signin';
            document.getElementById('authTitle').textContent = authMode === 'signin' ? 'Sign in to Anti-Algo' : 'Create your account';
            document.getElementById('authPassword').style.display = authMode === 'signup' ? 'block' : 'none';
        }

        function handleAuth() {
            const username = document.getElementById('authUsername').value;
            const password = document.getElementById('authPassword').value;
            
            if (!username) return alert('Please enter a username');
            
            currentUser = {
                name: username,
                handle: username.toLowerCase().replace(/\s+/g, ''),
                verified: false,
                tier: 1,
                createdAt: new Date().toISOString()
            };
            
            localStorage.setItem('antiAlgoUser', JSON.stringify(currentUser));
            updateUserDisplay();
            closeAuthModal();
        }

        // Post functions
        function openPostModal() {
            if (!currentUser) return openAuthModal();
            document.getElementById('postModal').classList.add('active');
        }

        function closePostModal() {
            document.getElementById('postModal').classList.remove('active');
        }

        function submitPost() {
            const content = document.getElementById('postContent').value;
            if (!content.trim()) return;
            
            const post = {
                id: Date.now(),
                author: currentUser.name,
                handle: '@' + currentUser.handle,
                content: content,
                timestamp: new Date().toISOString(),
                likes: 0,
                reposts: 0,
                replies: 0,
                verified: currentUser.verified,
                tier: currentUser.tier
            };
            
            posts.unshift(post);
            renderPosts();
            closePostModal();
            document.getElementById('postContent').value = '';
        }

        // Load posts from feed
        async function loadPosts() {
            try {
                const response = await fetch('data/feed.json');
                const data = await response.json();
                posts = data.items.map(item => ({
                    id: item.id,
                    author: 'Anti-Algo News',
                    handle: '@antialgo',
                    content: item.title + '\n\n' + item.body,
                    timestamp: new Date(Date.now() - item.minutesAgo * 60000).toISOString(),
                    likes: Math.floor(Math.random() * 500),
                    reposts: Math.floor(Math.random() * 100),
                    replies: Math.floor(Math.random() * 50),
                    verified: true,
                    tier: item.tier,
                    source: item.sources?.[0] || 'Verified',
                    location: item.location,
                    image: item.imageUrl
                }));
                renderPosts();
            } catch (e) {
                console.error('Error loading posts:', e);
            }
        }

        // Render posts
        function renderPosts() {
            const container = document.getElementById('postsContainer');
            container.innerHTML = posts.map(post => `
                <div class="post" onclick="viewPost('${post.id}')">
                    <div class="post-header">
                        <div class="post-avatar"></div>
                        <span class="post-author">${post.author}</span>
                        ${post.verified ? '<svg class="post-verified" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>' : ''}
                        <span class="tier-badge tier-${post.tier}">T${post.tier}</span>
                        <span class="post-handle">${post.handle}</span>
                        <span style="color:var(--text-secondary);font-size:13px;">· ${formatTime(post.timestamp)}</span>
                    </div>
                    <div class="post-content">${post.content}</div>
                    ${post.image ? `<div class="post-media"><img src="${post.image}" alt=""></div>` : ''}
                    <div class="post-actions">
                        <div class="post-action" onclick="event.stopPropagation();reply('${post.id}')">
                            <svg viewBox="0 0 24 24"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18z"/></svg>
                            <span>${post.replies}</span>
                        </div>
                        <div class="post-action" onclick="event.stopPropagation();repost('${post.id}')">
                            <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                            <span>${post.reposts}</span>
                        </div>
                        <div class="post-action" onclick="event.stopPropagation();like('${post.id}')">

        // Utility functions
        function formatTime(timestamp) {
            const now = new Date();
            const then = new Date(timestamp);
            const diff = Math.floor((now - then) / 60000);
            if (diff < 60) return diff + 'm';
            if (diff < 1440) return Math.floor(diff / 60) + 'h';
            return Math.floor(diff / 1440) + 'd';
        }

        function switchTab(tab) {
            document.querySelectorAll('.feed-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
