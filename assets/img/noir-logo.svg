<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12"/>
      <stop offset="100%" style="stop-color:#050508"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>

    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow for eyes -->
    <filter id="eyeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Radial glow -->
    <radialGradient id="radialGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
      <stop offset="70%" style="stop-color:#00f0ff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#050508;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="400" cy="400" r="400" fill="url(#bgGrad)"/>

  <!-- Ambient glow -->
  <ellipse cx="400" cy="350" rx="250" ry="200" fill="url(#radialGlow)"/>

  <!-- Specter body -->
  <g transform="translate(400, 380)">
    <!-- Main body shape -->
    <path d="M-100 -80
             C-150 -80 -180 -20 -180 60
             L-180 180
             C-180 240 -130 280 -60 300
             C-20 310 20 310 60 300
             C130 280 180 240 180 180
             L180 60
             C180 -20 150 -80 100 -80
             C60 -100 -60 -100 -100 -80 Z"
          fill="rgba(20,20,35,0.95)"
          stroke="rgba(255,255,255,0.15)"
          stroke-width="2"/>

    <!-- Shield icon on forehead -->
    <g transform="translate(0, -130)">
      <path d="M0 -45 L45 -30 L45 15 C45 45 22.5 65 0 75 C-22.5 65 -45 45 -45 15 L-45 -30 Z"
            fill="none" stroke="url(#shieldGrad)" stroke-width="4" filter="url(#glow)"/>
      <!-- Inner shield detail -->
      <path d="M0 -30 L30 -20 L30 10 C30 30 15 45 0 52 C-15 45 -30 30 -30 10 L-30 -20 Z"
            fill="url(#shieldGrad)" opacity="0.3"/>
    </g>

    <!-- Eyes -->
    <ellipse cx="-55" cy="40" rx="25" ry="10" fill="#ffffff" filter="url(#eyeGlow)"/>
    <ellipse cx="55" cy="40" rx="25" ry="10" fill="#ffffff" filter="url(#eyeGlow)"/>

    <!-- Mouth -->
    <rect x="-30" y="100" width="60" height="12" rx="6" fill="#ffffff" filter="url(#glow)" opacity="0.85"/>
  </g>

  <!-- "N" letter badge in corner -->
  <g transform="translate(650, 650)">
    <circle cx="0" cy="0" r="80" fill="url(#accentGrad)"/>
    <text x="0" y="25" font-family="Arial Black, sans-serif" font-size="90" font-weight="900"
          fill="#050508" text-anchor="middle">N</text>
  </g>

  <!-- Outer ring accent -->
  <circle cx="400" cy="400" r="390" fill="none" stroke="url(#accentGrad)" stroke-width="3" opacity="0.5"/>
  <circle cx="400" cy="400" r="395" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
</svg>
