<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="440" viewBox="0 0 400 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shieldGlassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="30%" style="stop-color:#00f0ff;stop-opacity:0.8"/>
      <stop offset="60%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.85"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g transform="translate(200, 220)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="164" fill="rgba(10,10,18,0.95)" stroke="url(#accentGrad)" stroke-width="5"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="148" fill="none" stroke="rgba(0,240,255,0.25)" stroke-width="1.5"/>

    <!-- Long shield with diamond -->
    <g transform="translate(0,-30)">
      <path d="M0 -90 L76 -56 L76 20 C76 84 40 120 0 140 C-40 120 -76 84 -76 20 L-76 -56 Z"
            fill="url(#shieldGlassGrad)" stroke="url(#accentGrad)" stroke-width="4" filter="url(#glow)"/>
      <path d="M0 -90 L76 -56 L76 20 C76 84 40 120 0 140 C-40 120 -76 84 -76 20 L-76 -56 Z"
            fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <path d="M-20,-84 C-50,-56 -64,-20 -60,16"
            fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
      <g transform="translate(0, 16)" filter="url(#glow)">
        <polygon points="0,-36 -24,-8 0,28 24,-8" fill="url(#diamondGrad)" opacity="0.9"/>
        <polygon points="0,-36 -20,-8 20,-8" fill="rgba(255,255,255,0.85)" opacity="0.9"/>
        <polygon points="0,-36 -24,-8 0,28 24,-8" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.5"/>
      </g>
    </g>

    <text x="-14" y="136" font-family="Arial Black, sans-serif" font-size="30" font-weight="900"
          fill="url(#accentGrad)" text-anchor="middle" letter-spacing="6">97</text>
    <text x="27" y="116" font-family="Arial Black, sans-serif" font-size="18" font-weight="900"
          fill="url(#accentGrad)" text-anchor="start">³</text>
  </g>
</svg>
