<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — Anti-Algo News Network</title>
    <link rel="icon" type="image/svg+xml" href="assets/img/oroboros-logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro-orange: #D97757;
            --bg-primary: #000000;
            --bg-secondary: rgba(255,255,255,0.03);
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --border-color: rgba(255,255,255,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .profile-header {
            position: relative;
            margin-bottom: 60px;
        }
        .banner {
            height: 200px;
            background: linear-gradient(135deg, var(--oro-orange), #ff9a76);
            border-radius: 16px;
        }
        .avatar-section {
            position: absolute;
            bottom: -50px;
            left: 20px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--oro-orange), #ff9a76);
            border: 4px solid var(--bg-primary);
        }
        .profile-info {
            padding: 60px 0 20px;
        }
        .profile-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .profile-handle {
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .profile-bio {
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .profile-stats {
            display: flex;
            gap: 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .profile-stats strong {
            color: var(--text-primary);
        }
        .edit-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .edit-btn:hover {
            background: var(--bg-secondary);
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            margin-top: 20px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 16px;
            cursor: pointer;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--oro-orange);
        }
        .posts-list {
            margin-top: 20px;
        }
        .post {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .post-content {
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .post-meta {
            color: var(--text-secondary);
            font-size: 13px;
        }
        .verified-badge {
            display: inline-flex;
            align-items: center;
            background: var(--oro-orange);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            margin-left: 8px;
        }
        .tier-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            background: #ff6b35;
            color: white;
            margin-left: 4px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 20px;
        }
        .back-link:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <a href="anti-algo.html" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Back to Feed
        </a>
        
        <div class="profile-header">
            <div class="banner"></div>
            <div class="avatar-section">
                <div class="avatar" id="userAvatar"></div>
            </div>
        </div>
        
        <div class="profile-info">
            <div style="display:flex;justify-content:space-between;align-items:start;">
                <div>
                    <div class="profile-name" id="userName">Guest User</div>
                    <div class="profile-handle" id="userHandle">@guest</div>
                </div>
                <button class="edit-btn" onclick="editProfile()">Edit profile</button>
            </div>
            <div class="profile-bio" id="userBio">Anti-algorithm advocate. Sovereign intelligence supporter. Free speech defender.</div>
            <div class="profile-stats">
                <span><strong id="followingCount">589</strong> Following</span>
                <span><strong id="followersCount">187</strong> Followers</span>
                <span>Joined <span id="joinDate">January 2026</span></span>
            </div>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('posts')">Posts</div>
            <div class="tab" onclick="switchTab('replies')">Replies</div>
            <div class="tab" onclick="switchTab('media')">Media</div>
            <div class="tab" onclick="switchTab('likes')">Likes</div>
        </div>
        
        <div class="posts-list" id="postsList">
            <!-- Posts loaded dynamically -->
        </div>
    </div>
    
    <script>
        // Load user profile
        function loadProfile() {
            const saved = localStorage.getItem('antiAlgoUser');
            if (saved) {
                const user = JSON.parse(saved);
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userHandle').textContent = '@' + user.handle;
                document.getElementById('joinDate').textContent = new Date(user.createdAt).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            }
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        function editProfile() {
            alert('Profile editing coming soon!');
        }
        
        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
